<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Redirecting // HadenZ</title>
  <script>
    (() => {
      const path = window.location.pathname.replace(/\/+$/, "").toLowerCase();
      const routes = {
        "": "/home/",
        "/index.html": "/home/",
        "/home": "/home/",
        "/commissions.html": "/comissions/",
        "/commissions": "/comissions/",
        "/comissions": "/comissions/"
      };
      const destination = routes[path];
      if (destination) {
        window.location.replace(destination + window.location.search + window.location.hash);
      }
    })();
  </script>
</head>
<body>
  <h1>That archive page was not found.</h1>
  <p><a href="/home/">Return to HadenZ</a></p>
</body>
</html>
